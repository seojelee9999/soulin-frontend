name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload dist to S3
        run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ --delete

      - name: Deploy on EC2 via SSM
        run: |
          CID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy soulin-frontend" \
            --parameters commands='["set -e","mkdir -p /var/www/soulin-frontend","rm -rf /var/www/soulin-frontend/*","aws s3 sync s3://${{ secrets.S3_BUCKET }}/ /var/www/soulin-frontend/ --delete","chown -R www-data:www-data /var/www/soulin-frontend","chmod -R 755 /var/www/soulin-frontend"]' \
            --output text --query 'Command.CommandId')
          echo "SSM Command ID: $CID"

          aws ssm wait command-executed \
            --command-id "$CID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'Status' --output text)
          echo "SSM Status: $STATUS"

          aws ssm get-command-invocation \
            --command-id "$CID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'StandardOutputContent' --output text

          ERR=$(aws ssm get-command-invocation \
            --command-id "$CID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'StandardErrorContent' --output text)
          if [ -n "$ERR" ]; then echo "STDERR: $ERR"; fi

          if [ "$STATUS" != "Success" ]; then
            echo "SSM command failed with status: $STATUS"
            exit 1
          fi
